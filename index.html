<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="booting">
  <div class="calligraphy-layer" aria-hidden="true">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="arabicPattern" width="980" height="460" patternUnits="userSpaceOnUse">
          <rect width="980" height="460" fill="transparent"></rect>
          <g fill="currentColor" font-family="'Amiri', serif" font-size="62" font-weight="700">
            <text x="920" y="102" direction="rtl" unicode-bidi="plaintext" transform="rotate(-4 490 100)">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ الله</text>
            <text x="936" y="200" direction="rtl" unicode-bidi="plaintext" transform="rotate(3 500 200)">شُكْرًا لِوُجُودِكِ في حَيَاتِنا يا إيناس، حُبُّكِ نُورٌ وَسَكِينَةٌ وَرَحْمَة</text>
            <text x="918" y="306" direction="rtl" unicode-bidi="plaintext" transform="rotate(-2 500 300)">مَحَبَّةٌ تَبْقَى وَذِكْرٌ جَمِيلٌ لا يَغِيبُ، وَقَلْبٌ يَدْعُو لَكِ بِالْخَيْرِ دَائِمًا</text>
            <text x="944" y="404" direction="rtl" unicode-bidi="plaintext" transform="rotate(2 500 404)">يَا رَبِّ احْفَظْهَا وَبَارِكْ فِي خُطَاهَا، وَاجْعَلْ أَيَّامَهَا نُورًا وَطُمَأْنِينَة</text>
          </g>
        </pattern>
        <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="1.85"></feGaussianBlur>
        </filter>
      </defs>
      <rect width="1600" height="900" fill="url(#arabicPattern)" filter="url(#softBlur)"></rect>
    </svg>
  </div>

  <header id="heroHeader" class="hero-header">
    <svg class="name-svg" viewBox="0 0 700 220" aria-label="Ines in Arabic">
      <text id="nameStroke" class="draw-text name-text" x="350" y="140" text-anchor="middle">إيناس</text>
    </svg>

    <svg class="message-svg" viewBox="0 0 950 210" aria-label="Dedication message">
      <text id="arabicMessage" class="draw-text message-text arabic" x="475" y="72" text-anchor="middle">شكراً لوجودك في حياتنا</text>
      <text id="englishMessage" class="draw-text message-text english" x="475" y="152" text-anchor="middle">Thank you for being in our lives</text>
    </svg>
  </header>

  <section id="photoWall" class="photo-wall" aria-label="Photo wall">
    <div id="wallGrid" class="wall-grid" aria-label="Album photos grid"></div>
    <aside
      id="playlistPanel"
      class="playlist-panel"
      data-playlist-id="https://open.spotify.com/playlist/1XiJIBcFTh0tv4BXeZGjg7?si=38ad65ce4060478b"
      aria-label="Spotify playlist"
    >
      <div class="playlist-header">
        <p class="playlist-title">Spotify Playlist</p>
        <div class="playlist-actions">
          <button type="button" class="playlist-toggle" aria-expanded="true">Collapse</button>
          <a class="playlist-open" href="#" target="_blank" rel="noopener">Open in Spotify</a>
        </div>
      </div>
      <div class="playlist-body">
        <p class="playlist-placeholder">
          Add your Spotify playlist ID in index.html to show the song list here.
        </p>
        <iframe
          class="playlist-embed"
          title="Spotify playlist"
          loading="lazy"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        ></iframe>
      </div>
    </aside>
  </section>

  <script src="photos/media-manifest.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
