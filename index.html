        <text
           x="920"

           direction="rtl"
           unicode-bidi="plaintext"
           transform="rotate(-4 490 100)"
           id="text1">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ الله</text>
        <text
           x="936"
           y="200"
           direction="rtl"
           unicode-bidi="plaintext"
           transform="rotate(3 500 200)"
           id="text2">شُكْرًا لِوُجُودِكِ في حَيَاتِنا يا إيناس، حُبُّكِ نُورٌ وَسَكِينَةٌ وَرَحْمَة</text>
        <text
           x="918"
           y="306"
           direction="rtl"
           unicode-bidi="plaintext"
           transform="rotate(-2 500 300)"
           id="text3">مَحَبَّةٌ تَبْقَى وَذِكْرٌ جَمِيلٌ لا يَغِيبُ، وَقَلْبٌ يَدْعُو لَكِ بِالْخَيْرِ دَائِمًا</text>
        <text
           x="944"
           y="404"
           direction="rtl"
           unicode-bidi="plaintext"
           transform="rotate(2 500 404)"
           id="text4">يَا رَبِّ احْفَظْهَا وَبَارِكْ فِي خُطَاهَا، وَاجْعَلْ أَيَّامَهَا نُورًا وَطُمَأْنِينَة</text>
      </g>
